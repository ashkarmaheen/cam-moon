 <!-- service open -->
       <div class="service">

       <div class="servicebox">
           <div class="servicenav">
            <div class="w3-bar w3-black">
                <button class="w3-bar-item w3-button tablink w3-red" onclick="openCity(event,'wedding')">WEDDING</button>
                <button class="w3-bar-item w3-button tablink" onclick="openCity(event,'engagement')">EMGAGEMENT</button>
                <button class="w3-bar-item w3-button tablink" onclick="openCity(event,'savethedate')">SAVE THE DATE</button>
                <button class="w3-bar-item w3-button tablink" onclick="openCity(event,'events')">EVENTS</button>
              </div>
           </div>
            <div class="serviceimage"><div id="wedding" class="w3-container w3-border city">
                <div class="imagebox">
                  <img src="image/5493bfd6-f6c7-441e-a075-6b47ceebabee.jpeg" class="image"/>
                </div>
                <div class="imagebox"><img src="image/Quaint Farmhouse Wedding in Delhi with the Bride as Pretty as a Picture!.jpeg" class="image"/></div>
                <div class="imagebox"><img src="image/wedding photo Retoucher on UpWork_ top ten wedding photo editor in UpWork _ carddesignrr.jpeg" class="image"/></div>          
              </div> 
            
              <div id="engagement" class="w3-container w3-border city">
                <div class="imagebox"></div>
                <div class="imagebox"></div>
                <div class="imagebox"></div>
              </div>
            
              <div id="savethedate" class="w3-container w3-border city" style="display:none">
                <h2>Tokyo</h2>
                <p>Tokyo is the capital of Japan.</p>
              </div>

              <div id="events" class="w3-container w3-border city" style="display:none">
                <h2>Tokyo</h2>
                <p>Tokyo is the capital of Japan.</p>
              </div>

            </div> 
       </div>  
 <!-- service close -->
    </div>






    <script>
        function openCity(evt, cityName) {
          var i, x, tablinks;
          x = document.getElementsByClassName("city");
          for (i = 0; i < x.length; i++) {
            x[i].style.display = "none";
          }
          tablinks = document.getElementsByClassName("tablink");
          for (i = 0; i < x.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" w3-red", "");
          }
          document.getElementById(cityName).style.display = "block";
          evt.currentTarget.className += " w3-red";
        }
        </script>        
</body>
</html>
